<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- КАР-точки — фирменная иконка: ворона + «точки», тёплая бумага + терракота -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF7EF"/>
      <stop offset="1" stop-color="#EEE2CE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.44" cy="0.40" r="0.55">
      <stop offset="0" stop-color="#E06F38" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#E06F38" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E2820"/>
      <stop offset="1" stop-color="#211C15"/>
    </linearGradient>
  </defs>

  <!-- фон (полное поле — iOS сам скруглит) -->
  <rect width="1024" height="1024" fill="url(#paper)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- ворона: голова + клюв смотрят вправо -->
  <g>
    <!-- мягкая тень под головой -->
    <ellipse cx="452" cy="632" rx="180" ry="30" fill="#2A2018" opacity="0.10"/>

    <!-- клюв -->
    <path d="M 604 360 Q 780 372 858 430 Q 780 488 604 500 Q 632 430 604 360 Z" fill="url(#ink)"/>
    <!-- голова -->
    <circle cx="452" cy="430" r="196" fill="url(#ink)"/>
    <!-- глаз -->
    <circle cx="512" cy="404" r="40" fill="#FBFAF7"/>
    <circle cx="524" cy="398" r="17" fill="#211C15"/>
    <circle cx="516" cy="391" r="5.5" fill="#FBFAF7" opacity="0.85"/>
  </g>

  <!-- «точки» — терракота, затухающий ритм -->
  <g>
    <circle cx="372" cy="756" r="46" fill="#C45528"/>
    <circle cx="512" cy="756" r="46" fill="#C45528" opacity="0.6"/>
    <circle cx="652" cy="756" r="46" fill="#C45528" opacity="0.3"/>
  </g>
</svg>
