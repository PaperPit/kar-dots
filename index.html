<!DOCTYPE html>
<html lang="ru">
<head>
  <script>
    (function () {
      var t = localStorage.getItem('kar_theme');
      if (t !== 'light' && t !== 'dark') {
        t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>КАР-точки — запоминай слова</title>
  <meta name="description" content="КАР-точки: карточки для запоминания слов, терминов и цитат с интервальным повторением.">
  <meta name="theme-color" content="#F6F0E6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#151619" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="КАР-точки">
  <link rel="preload" href="css/fonts/nunito-cyr.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="css/fonts/nunito-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/fonts/fonts.css">
  <!-- Параллельные link вместо @import в style.css — все CSS стартуют одним RTT -->
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/screens/home.css">
  <link rel="stylesheet" href="css/screens/folder.css">
  <link rel="stylesheet" href="css/screens/card-editor.css">
  <link rel="stylesheet" href="css/screens/review.css">
  <link rel="stylesheet" href="css/screens/settings.css">
  <link rel="stylesheet" href="css/screens/stats.css">
  <link rel="stylesheet" href="css/screens/youtube-import.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" class="app">
    <div class="boot-splash" id="bootSplash">
      <svg class="boot-crow" viewBox="0 0 256 256" width="72" height="72" aria-hidden="true">
        <g fill="currentColor">
          <circle cx="112" cy="102" r="54"/>
          <path d="M 152 84 Q 196 88 220 101 Q 196 114 152 120 Q 162 101 152 84 Z"/>
          <circle class="boot-eye" cx="124" cy="88" r="10"/>
          <circle cx="76" cy="196" r="13" class="boot-dot d1"/>
          <circle cx="120" cy="196" r="13" class="boot-dot d2"/>
          <circle cx="164" cy="196" r="13" class="boot-dot d3"/>
        </g>
      </svg>
    </div>
  </div>
  <div id="toasts" class="toasts" aria-live="polite"></div>
  <div id="modalRoot"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
