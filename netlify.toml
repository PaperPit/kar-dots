[build]
  publish = "dist"
  command = "node scripts/generate-config.js && npm run build:bundle"

[build.environment]
  # Ключи Supabase — публичные по дизайну (anon key уезжает в браузер, данные
  # защищает RLS), поэтому исключаем их из сканера секретов. Настоящие секреты
  # (GEMINI_API_KEY, GROQ_API_KEY) сканер продолжает проверять.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,PIXABAY_API_KEY,GIPHY_API_KEY"

# Серверная часть импорта из YouTube (ключи — в Environment variables).
# Транскрипт достаётся напрямую из YouTube (без сторонних сервисов), см.
# docs/youtube-import-setup.md.
#   GEMINI_API_KEY  — aistudio.google.com (основной провайдер генерации карточек)
#   GEMINI_MODEL    — опционально, по умолчанию gemini-flash-latest
#   GROQ_API_KEY    — console.groq.com (резерв генерации + распознавание речи
#                     для роликов без субтитров) — настоятельно рекомендуется
[functions]
  directory = "netlify/functions"
